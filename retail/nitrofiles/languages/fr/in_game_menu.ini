AUTO=Auto
BOTTOM=Bas
TOP=Haut
67_MHZ=67 MHz
133_MHZ=133 MHz
DS_MODE=Mode DS
DSI_MODE=Mode DSi

MAIN_SCREEN_DESC=Définir si l'écran principal est affiché en haut ou en bas. N'affecte pas le choix de l'écran pour les captures d'écran.
BRIGHTNESS_DESC=Modifier le niveau de luminosité de l'écran.
VOLUME_DESC=Modifier le volume sonore.
REFRESH_RATE_DESC=Peut être utilisé pour ajuster la vitesse du jeu. Certains jeux peuvent tourner plus lentement que prévu. Régler la fréquence d'horloge au-dessus de 59.9 Hz empêchera le moteur 3D de fonctionner.
CLOCK_SPEED_DESC=Modifier la fréquence d'horloge ARM9 à 67 MHz (NTR) ou 133 MHz (TWL).
VRAM_MODE_DESC=Modifier le mode VRAM en mode DS ou DSi. Le mode DSi peut causer des problèmes graphiques dans certains jeux.
